        function exportSnapshot() {
            if (renderMode === 'svg') {
                var container = document.getElementById('sivo-native-overlay-svg-container');
                if (!container) return;
                var svgClone = container.querySelector('svg').cloneNode(true);
                var source = new XMLSerializer().serializeToString(svgClone);
                if(!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)){
                    source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
                }
                if(!source.match(/^<svg[^>]+"http\:\/\/www\.w3\.org\/1999\/xlink"/)){
                    source = source.replace(/^<svg/, '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
                }
                source = '<?xml version="1.0" standalone="no"?>\r\n' + source;
                var url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);
                var downloadLink = document.createElement("a");
                downloadLink.href = url;
                downloadLink.download = "sivo-snapshot.svg";
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            } else {
                var imgData = myChart.getDataURL({ type: 'png', pixelRatio: 2, backgroundColor: '#fff' });
                var downloadLink = document.createElement("a");
                downloadLink.href = imgData;
                downloadLink.download = "sivo-snapshot.png";
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            }
        }

        function initLayerLegend(toggles) {
            var legendContainer = document.getElementById('layer-legend');
            var legendContent = document.getElementById('layer-legend-content');
            if (!toggles || toggles.length === 0) {
                legendContainer.style.display = 'none';
                return;
            }
            legendContainer.style.display = 'block';
            legendContent.innerHTML = '';
            toggles.forEach(function(toggle) {
                var label = document.createElement('label');
                label.className = 'layer-toggle';
                var checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = toggle.default_visible;
                checkbox.dataset.elementIds = JSON.stringify(toggle.element_ids);
                checkbox.addEventListener('change', function(e) {
                    var isVisible = e.target.checked;
                    var ids = JSON.parse(e.target.dataset.elementIds);
                    if (renderMode === 'svg') {
                        var overlayGroup = document.getElementById('sivo-global-transform-group');
                        if (overlayGroup) {
                            ids.forEach(function(id) {
                                var node = overlayGroup.querySelector(`[id="${id}"], [name="${id}"]`);
                                if (node) node.style.display = isVisible ? '' : 'none';
                            });
                        }
                    }
                    var currentOption = myChart.getOption();
                    if (currentOption && currentOption.series && currentOption.series[0].data) {
                        var seriesData = currentOption.series[0].data;
                        var updated = false;
                        for (var i = 0; i < seriesData.length; i++) {
                            if (ids.includes(seriesData[i].name)) {
                                if (!seriesData[i].itemStyle) seriesData[i].itemStyle = {};
                                seriesData[i].itemStyle.opacity = isVisible ? 1 : 0;
                                updated = true;
                            }
                        }
                        if (updated) myChart.setOption({ series: [{ data: seriesData }] });
                    }
                });
                var span = document.createElement('span');
                span.innerText = toggle.label;
                label.appendChild(checkbox);
                label.appendChild(span);
                legendContent.appendChild(label);
                if (!toggle.default_visible) {
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
        }

        function initSearch(view) {
            var searchContainer = document.getElementById('sivo-search-container');
            var searchInput = document.getElementById('sivo-search-input');
            var searchResults = document.getElementById('sivo-search-results');
            var geocoderContainer = document.getElementById('sivo-geocoder-container');

            if (!view.enable_search) {
                searchContainer.style.display = 'none';
            } else {
                searchContainer.style.display = 'block';

                // Build search index globally so the event listener doesn't trap old closure scope on re-render
                window.sivoSearchIndex = [];

                // Helper to strip HTML tags for search display
                function stripHtml(html) {
                    var tmp = document.createElement("DIV");
                    tmp.innerHTML = html;
                    return tmp.textContent || tmp.innerText || "";
                }

                echartsData.forEach(function(item) {
                    var rawTitle = item.tooltip || item.name;
                    // Strip HTML from title so we don't accidentally render images/blockquotes in the tiny search dropdown
                    var title = stripHtml(rawTitle);

                    var subtitle = item.name !== rawTitle ? item.name : '';
                    window.sivoSearchIndex.push({
                        id: item.name,
                        title: title,
                        subtitle: subtitle,
                        searchStr: (title + ' ' + subtitle).toLowerCase()
                    });
                });

                window.sivoRenderSearchResults = function(query) {
                    if (!query) {
                        searchResults.style.display = 'none';
                        return;
                    }

                    var q = query.toLowerCase();
                    var results = window.sivoSearchIndex.filter(item => item.searchStr.includes(q)).slice(0, 10); // Limit to 10

                    if (results.length === 0) {
                        searchResults.innerHTML = '<div class="sivo-search-result-item"><span class="sivo-search-result-subtitle">No results found</span></div>';
                        searchResults.style.display = 'block';
                        return;
                    }

                    searchResults.innerHTML = '';
                    results.forEach(function(item) {
                        var el = document.createElement('div');
                        el.className = 'sivo-search-result-item';
                        el.innerHTML = `<div class="sivo-search-result-title">${item.title}</div><div class="sivo-search-result-subtitle">${item.subtitle}</div>`;

                        el.addEventListener('mousedown', function(e) {
                            e.preventDefault(); // Prevent input blur
                            window.sivoSelectSearchResult(item.id);
                        });

                        searchResults.appendChild(el);
                    });
                    searchResults.style.display = 'block';
                }

                window.sivoSelectSearchResult = function(elementId) {
                    searchInput.value = '';
                    searchResults.style.display = 'none';
                    searchInput.blur();

                    // Focus element
                    myChart.dispatchAction({ type: 'geoSelect', name: elementId });

                    // Force highlight by fading everything else
                    applyFadeUnselected(elementId, true);

                    // Check if it has a specific overlay bound center
                    var viewMeta = overlaysData[elementId];
                    if (viewMeta && viewMeta.coord) {
                        myChart.setOption({ series: [{ center: viewMeta.coord, zoom: 3.0 }] });
                    } else {
                        // Trigger click to center map if ECharts handles it, or trigger panel logic
                        myChart.trigger('click', { componentType: 'series', name: elementId });

                        // Show tooltip
                        myChart.dispatchAction({ type: 'showTip', name: elementId });
                    }
                }

                // Using oninput/onfocus/onblur directly to safely overwrite any old closure references
                // without stacking up event listeners on re-render.
                searchInput.oninput = function(e) {
                    window.sivoRenderSearchResults(e.target.value);
                };

                searchInput.onfocus = function(e) {
                    if (e.target.value) window.sivoRenderSearchResults(e.target.value);
                };

                searchInput.onblur = function(e) {
                    setTimeout(() => searchResults.style.display = 'none', 100);
                };
            }

            if (view.enable_geocoder) {
                geocoderContainer.style.display = 'block';
                if (view.enable_search) {
                    geocoderContainer.style.top = '70px';
                } else {
                    geocoderContainer.style.top = '20px';
                }

                var geocodeInput = document.getElementById('sivo-geocoder-input');
                var geocodeResults = document.getElementById('sivo-geocoder-results');
                var geocodeSpinner = document.getElementById('sivo-geocoder-spinner');
                var debounceTimer = null;

                window.sivoSelectGeocodeResult = function(lat, lon, displayName) {
                    geocodeInput.value = displayName;
                    geocodeResults.style.display = 'none';
                    geocodeInput.blur();

                    var plotLat = lat;
                    if (view && view.bounding_coords) {
                        var minLat = view.bounding_coords[0][1];
                        var maxLat = view.bounding_coords[1][1];
                        plotLat = (maxLat + minLat) - lat; // INVERT LATITUDE
                    }

                    // Camera Zoom and Marker Placement
                    var opt = myChart.getOption();
                    var newOpt = {};

                    // Update camera zoom for geo or series
                    if (opt.geo && opt.geo.length > 0) {
                        newOpt.geo = [{
                            center: [lon, plotLat],
                            zoom: 15
                        }];
                    } else if (opt.series && opt.series.length > 0) {
                        newOpt.series = [{
                            center: [lon, plotLat],
                            zoom: 15
                        }];
                    }

                    myChart.setOption(newOpt);

                    // Pulsing Marker Placement
                    // Using an HTML overlay ensures the marker sits on top of everything (z-index)
                    // and perfectly tracks the coordinate dynamically without native geo scale distortions.
                    var htmlPulse = `
                    <div style="position: relative; width: 0; height: 0;">
                        <!-- Pulsing Base -->
                        <div style="position: absolute; left: -20px; top: -20px; width: 40px; height: 40px; background: rgba(239, 68, 68, 0.4); border-radius: 50%; animation: sivo-geocoder-pulse-anim 2s infinite ease-in-out; pointer-events: none;"></div>
                        <!-- Static Pin Icon -->
                        <div style="position: absolute; left: -12px; top: -24px; font-size: 24px; color: #ef4444; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5)); pointer-events: none;">📍</div>
                    </div>
                    <style>
                        @keyframes sivo-geocoder-pulse-anim {
                            0% { transform: scale(0.5); opacity: 1; }
                            100% { transform: scale(2.0); opacity: 0; }
                        }
                    </style>
                    `;

                    overlaysData['sivo-geocoder-pulse-overlay'] = {
                        html: htmlPulse,
                        coord: [lon, plotLat],
                        offset: [0, 0], // True center, the HTML shifts its own children
                        scale_with_zoom: false
                    };
                    initOverlays();
                    updateOverlaysPosition();
                };

                geocodeInput.oninput = function(e) {
                    var query = e.target.value;
                    if (debounceTimer) {
                        clearTimeout(debounceTimer);
                    }

                    if (query.length < 3) {
                        geocodeResults.style.display = 'none';
                        geocodeSpinner.style.display = 'none';
                        return;
                    }

                    debounceTimer = setTimeout(function() {
                        geocodeSpinner.style.display = 'block';

                        var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`;

                        fetch(url, {
                            headers: {
                                'Accept-Language': 'en-US,en;q=0.9'
                            }
                        })
                        .then(response => response.json())
                        .then(data => {
                            geocodeSpinner.style.display = 'none';

                            if (!data || data.length === 0) {
                                geocodeResults.innerHTML = '<div class="sivo-search-result-item"><span class="sivo-search-result-subtitle">No results found</span></div>';
                                geocodeResults.style.display = 'block';
                                return;
                            }

                            geocodeResults.innerHTML = '';
                            data.forEach(function(item) {
                                var el = document.createElement('div');
                                el.className = 'sivo-search-result-item';
                                el.innerHTML = `<div class="sivo-search-result-title">${item.display_name}</div>`;

                                el.addEventListener('mousedown', function(e) {
                                    e.preventDefault();
                                    window.sivoSelectGeocodeResult(parseFloat(item.lat), parseFloat(item.lon), item.display_name);
                                });

                                geocodeResults.appendChild(el);
                            });
                            geocodeResults.style.display = 'block';
                        })
                        .catch(error => {
                            console.error('Error fetching geocode results:', error);
                            geocodeSpinner.style.display = 'none';
                        });
                    }, 500);
                };

                geocodeInput.onblur = function(e) {
                    setTimeout(() => geocodeResults.style.display = 'none', 200);
                };

            } else {
                geocoderContainer.style.display = 'none';
            }
        }

        function downloadDataCSV() {
            var csvContent = "data:text/csv;charset=utf-8,";

            if (dataBinding && dataBinding.data) {
                csvContent += "Region," + dataBinding.key + "\n";
                for (var name in dataBinding.data) {
                    var val = dataBinding.data[name][dataBinding.key];
                    if (val !== undefined) {
                        csvContent += `"${name}",${val}\n`;
                    }
                }
            } else if (timelineBinding && timelineBinding.data) {
                var firstTimeKey = Object.keys(timelineBinding.data)[0];
                var keys = ["Region"];
                var timelineKeys = Object.keys(timelineBinding.data);
                keys = keys.concat(timelineKeys);
                csvContent += keys.join(",") + "\n";

                // Collect all regions
                var regions = new Set();
                timelineKeys.forEach(tKey => {
                    Object.keys(timelineBinding.data[tKey]).forEach(r => regions.add(r));
                });

                regions.forEach(r => {
                    var row = [`"${r}"`];
                    timelineKeys.forEach(tKey => {
                        var val = timelineBinding.data[tKey][r] ? timelineBinding.data[tKey][r][timelineBinding.key] : "";
                        row.push(val !== undefined ? val : "");
                    });
                    csvContent += row.join(",") + "\n";
                });
            } else {
                alert("No data to download.");
                return;
            }

            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            var view = viewsData[currentViewId];
            link.setAttribute("download", (view.title ? view.title.replace(/\s+/g, '_').toLowerCase() : "sivo_data") + ".csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Check for transition parameter in URL
        var urlParams = new URLSearchParams(window.location.search);
        var initialTransition = urlParams.get('sivo_transition_in');

        if (initialTransition) {
            // Apply the -in class immediately before rendering,
            // by setting nextTransition, so renderView uses it.
            // However, to make it animate, we need to first start from the -out state,
            // render the view, and then transition to -in.

            // Temporarily disable CSS transitions so we can snap to the -out state
            chartDom.style.transition = 'none';
            var tClassBase = 'sivo-view-transition-' + initialTransition;
            chartDom.classList.add(tClassBase + '-out');

            // Force a reflow
            void chartDom.offsetWidth;

            // Restore transition
            chartDom.style.transition = '';

            // Set the transition for renderView to use
            nextTransition = tClassBase;

            // Clean up the URL parameter without reloading the page
            if (window.history && window.history.replaceState) {
                var cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                var remainingParams = new URLSearchParams(window.location.search);
                remainingParams.delete('sivo_transition_in');
                if (remainingParams.toString()) {
                    cleanUrl += '?' + remainingParams.toString();
                }
                window.history.replaceState({path: cleanUrl}, '', cleanUrl);
            }
        }

                contextMenuDOM.style.display = 'flex'; // needed to get real width/height

        // Draggable Overlay Functionality
        function makeDraggable(elmnt) {
            if (!elmnt) return;
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            // Set explicit cursor
            if (!elmnt.style.cursor) {
                elmnt.style.cursor = 'move';
            }

            // Reset cursor for interactive inner elements
            var interactiveSelectors = 'input, button, a, select, textarea, .zoom-btn, .sivo-switch, .close-btn, label, .layer-toggle, .tour-btn, .sivo-search-result-item';
            var interactives = elmnt.querySelectorAll(interactiveSelectors);
            interactives.forEach(function(el) { el.style.cursor = 'default'; });

            elmnt.addEventListener('mousedown', dragMouseDown);
            elmnt.addEventListener('touchstart', dragMouseDown, {passive: false});

            function dragMouseDown(e) {
                // Ignore clicks on interactive elements inside the draggable container
                if (e.target.closest(interactiveSelectors)) return;

                // Allow user to highlight text inside the element without triggering drag
                if (e.target.tagName === 'P' || e.target.tagName === 'H1' || e.target.tagName === 'H2' || e.target.tagName === 'H3' || e.target.tagName === 'SPAN') {
                    // Let default selection happen if they try
                    // But maybe we just let them drag by clicking the background
                }

                e.preventDefault(); // Prevents touch scrolling while dragging

                var clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                var clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                pos3 = clientX;
                pos4 = clientY;

                // Initialize explicitly computed styles if they are missing
                var rect = elmnt.getBoundingClientRect();
                var parentRect = elmnt.parentElement.getBoundingClientRect();

                elmnt.style.right = 'auto';
                elmnt.style.bottom = 'auto';
                elmnt.style.transform = 'none';
                elmnt.style.left = (rect.left - parentRect.left) + 'px';
                elmnt.style.top = (rect.top - parentRect.top) + 'px';
                elmnt.style.margin = '0';

                document.addEventListener('mouseup', closeDragElement);
                document.addEventListener('mousemove', elementDrag);
                document.addEventListener('touchend', closeDragElement);
                document.addEventListener('touchmove', elementDrag, {passive: false});

                // Bring to front
                elmnt.style.zIndex = (parseInt(window.getComputedStyle(elmnt).zIndex) || 1000) + 1;
            }

            function elementDrag(e) {
                e.preventDefault();
                var clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                var clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                pos1 = pos3 - clientX;
                pos2 = pos4 - clientY;
                pos3 = clientX;
                pos4 = clientY;

                // Calculate new positions
                var newTop = elmnt.offsetTop - pos2;
                var newLeft = elmnt.offsetLeft - pos1;

                elmnt.style.top = newTop + "px";
                elmnt.style.left = newLeft + "px";
            }

            function closeDragElement() {
                document.removeEventListener('mouseup', closeDragElement);
                document.removeEventListener('mousemove', elementDrag);
                document.removeEventListener('touchend', closeDragElement);
                document.removeEventListener('touchmove', elementDrag);
            }
        }

        // Apply drag functionality to UI overlays
        makeDraggable(document.getElementById('sivo-title-container'));
        makeDraggable(document.getElementById('sivo-attribution'));
        makeDraggable(document.getElementById('sivo-search-container'));
        makeDraggable(document.getElementById('layer-legend'));
        makeDraggable(document.getElementById('sivo-watermark-container'));
        makeDraggable(document.getElementById('tour-container'));
        makeDraggable(document.querySelector('.zoom-controls'));


        // Track zoom natively from georoam events since getOption() might not update on scroll
        myChart.on('georoam', function(params) {
            if (params.zoom) {
                // params.zoom is a delta multiplier, not absolute zoom
                currentZoom *= params.zoom;
            }

            syncOverlayTransform();

            // Sync zoom from map to geo component if lines exist to keep them aligned during drag
            if (connectionsData.length > 0) {
                var option = myChart.getOption();
                if (option.series && option.series[0] && option.geo) {
                    myChart.setOption({
                        geo: [{
                            zoom: option.series[0].zoom,
                            center: option.series[0].center
                        }]
                    });
                }
            }

            if (window.sivoDrawings && window.sivoDrawings.length > 0) {
                redrawCanvas();
            }

            // If dragging, params.zoom is undefined, but we still need to update position
            updateOverlaysPosition();
            updateMinimapViewport();
        });


        function updateChartLayoutSizes() {
            var actualViewId = (currentViewId === "compare_mode") ? "compare_left" : currentViewId;
            var view = viewsData[actualViewId];
            if (!view || !view.layout_size || typeof view.layout_size !== 'string' || !view.layout_size.endsWith('%')) return;

            var newSize = calculateLayoutSize(view, chartDom);
            var opt = { series: [{ layoutSize: newSize }] };
            var currentOpt = myChart.getOption();

            if (currentOpt && currentOpt.geo && currentOpt.geo.length > 0) {
                opt.geo = [{ layoutSize: newSize }];
            }

            myChart.setOption(opt, false);

            if (myChartCompareRight) {
                var viewRight = viewsData["compare_right"] || view;
                var newSizeRight = calculateLayoutSize(viewRight, document.getElementById('chart-container-compare-right'));
                var optRight = { series: [{ layoutSize: newSizeRight }] };
                var currentOptRight = myChartCompareRight.getOption();
                if (currentOptRight && currentOptRight.geo && currentOptRight.geo.length > 0) {
                    optRight.geo = [{ layoutSize: newSizeRight }];
                }
                myChartCompareRight.setOption(optRight, false);
            }
        }

        // Handle window resize
        window.addEventListener('resize', function() {
            updateChartLayoutSizes();
            myChart.resize();
            if (myChartCompareRight) myChartCompareRight.resize();
            updateOverlaysPosition();

            var rect = chartDom.getBoundingClientRect();
            if (drawingCanvas) {
                drawingCanvas.width = rect.width;
                drawingCanvas.height = rect.height;
                if (window.sivoDrawings) redrawCanvas();
            }
            if (ambientCanvas && ambientCtx) {
                ambientCanvas.width = rect.width;
                ambientCanvas.height = rect.height;
            }
        });

        // Drawing Tools Logic
        var drawingCanvas = document.getElementById('sivo-drawing-canvas');
        var drawingCtx = drawingCanvas ? drawingCanvas.getContext('2d') : null;
        var isDrawingMode = false;
        var currentDrawMode = 'pen'; // 'pen', 'text', or 'eraser'
        var drawColor = '#ef4444';

        // We will store paths as arrays of logical points [x, y] in the chart's base coordinate system
        // to properly handle ECharts zoom/pan.
        window.sivoDrawings = [];
        var currentPath = null;
        var isDrawingMouse = false;
        var textInputEl = null;

        function initDrawingTools(view) {
            var toolbar = document.getElementById('sivo-drawing-toolbar');
            if (view.enable_drawing_tools) {
                toolbar.style.display = 'flex';
                // Move toolbar down if there is a top-right layer legend to prevent overlap
                if (view.layer_toggles && view.layer_toggles.length > 0) {
                    toolbar.style.top = '70px';
                } else {
                    toolbar.style.top = '20px';
                }

                var rect = chartDom.getBoundingClientRect();
                drawingCanvas.width = rect.width;
                drawingCanvas.height = rect.height;
                drawingCanvas.style.display = 'block';
            } else {
                toolbar.style.display = 'none';
                drawingCanvas.style.display = 'none';
                isDrawingMode = false;
            }
        }

        // Toolbar Events
        var toggleBtn = document.getElementById('sivo-draw-toggle');
        var toolsDiv = document.getElementById('sivo-draw-tools');
        var penBtn = document.getElementById('sivo-draw-pen');
        var textBtn = document.getElementById('sivo-draw-text');
        var eraserBtn = document.getElementById('sivo-draw-eraser');
        var colorInput = document.getElementById('sivo-drawing-color');
        var clearBtn = document.getElementById('sivo-draw-clear');

        if (toggleBtn) toggleBtn.addEventListener('click', function() {
            isDrawingMode = !isDrawingMode;
            if (isDrawingMode) {
                toggleBtn.classList.add('active');
                toolsDiv.style.display = 'flex';
                drawingCanvas.style.pointerEvents = 'auto'; // intercept clicks
                // Lock roam on echarts while drawing if desired, or let it pass through if not drawing
            } else {
                toggleBtn.classList.remove('active');
                toolsDiv.style.display = 'none';
                drawingCanvas.style.pointerEvents = 'none';
            }
        });

        if (penBtn) penBtn.addEventListener('click', function() {
            currentDrawMode = 'pen';
            penBtn.classList.add('active');
            textBtn.classList.remove('active');
            eraserBtn.classList.remove('active');
        });

        if (textBtn) textBtn.addEventListener('click', function() {
            currentDrawMode = 'text';
            textBtn.classList.add('active');
            penBtn.classList.remove('active');
            eraserBtn.classList.remove('active');
        });

        if (eraserBtn) eraserBtn.addEventListener('click', function() {
            currentDrawMode = 'eraser';
            eraserBtn.classList.add('active');
            penBtn.classList.remove('active');
            textBtn.classList.remove('active');
        });

        if (colorInput) colorInput.addEventListener('input', function(e) {
            drawColor = e.target.value;
        });

        if (clearBtn) clearBtn.addEventListener('click', function() {
            window.sivoDrawings = [];
            drawingCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
        });

        function convertToLogical(x, y) {
            // Because ECharts doesn't provide a perfect public API to convert pixel to logical coordinate
            // taking into account BOTH pan and zoom for the map series simply, we use a rough heuristic,
            // or we store the raw mouse pixels and apply the ECharts transform manually.
            // A more robust way is to just use ECharts convertFromPixel if geo is used, or store relative to canvas
            // For a simple annotation layer, we will just store raw pixels and apply the getOption().series[0].zoom manually on redraw.

            // Actually, myChart.convertFromPixel({seriesIndex: 0}, [x, y]) works perfectly for maps!
            var logical = myChart.convertFromPixel({seriesIndex: 0}, [x, y]);
            return logical || [x, y]; // fallback to raw
        }

        function convertToPixel(point) {
            var px = myChart.convertToPixel({seriesIndex: 0}, point);
            return px || point;
        }

        function finalizeText() {
            if (!textInputEl) return;
            var val = textInputEl.value.trim();
            if (val !== '') {
                window.sivoDrawings.push({
                    mode: 'text',
                    text: val,
                    color: drawColor,
                    // store the logical anchor point
                    point: convertToLogical(parseFloat(textInputEl.style.left), parseFloat(textInputEl.style.top) + 20) // approx baseline
                });
                redrawCanvas();
            }
            document.body.removeChild(textInputEl);
            textInputEl = null;
        }

        function startDrawing(e) {
            if (!isDrawingMode) return;

            var rect = drawingCanvas.getBoundingClientRect();
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;

            var x = clientX - rect.left;
            var y = clientY - rect.top;

            if (currentDrawMode === 'text') {
                if (textInputEl) {
                    finalizeText();
                    return; // Next click will spawn a new one, this click just closes the old
                }

                textInputEl = document.createElement('input');
                textInputEl.type = 'text';
                textInputEl.style.position = 'absolute';
                textInputEl.style.left = (clientX) + 'px';
                textInputEl.style.top = (clientY - 10) + 'px';
                textInputEl.style.zIndex = 10000;
                textInputEl.style.background = 'transparent';
                textInputEl.style.border = '1px dashed #ccc';
                textInputEl.style.outline = 'none';
                textInputEl.style.color = drawColor;
                textInputEl.style.fontFamily = 'system-ui, sans-serif';
                textInputEl.style.fontSize = (16 * (currentZoom || 1)) + 'px';
                textInputEl.style.padding = '2px';
                textInputEl.style.minWidth = '100px';

                document.body.appendChild(textInputEl);
                textInputEl.focus();

                textInputEl.addEventListener('keydown', function(evt) {
                    if (evt.key === 'Enter') {
                        finalizeText();
                    }
                });
                textInputEl.addEventListener('blur', function() {
                    // Slight delay to allow clicks to register
                    setTimeout(finalizeText, 100);
                });

                e.preventDefault();
                return;
            }

            isDrawingMouse = true;

            currentPath = {
                mode: currentDrawMode,
                color: currentDrawMode === 'eraser' ? null : drawColor,
                width: currentDrawMode === 'eraser' ? 20 : 3,
                points: [convertToLogical(x, y)]
            };

            window.sivoDrawings.push(currentPath);
            e.preventDefault();
        }

        function continueDrawing(e) {
            if (!isDrawingMode || !isDrawingMouse || !currentPath || currentDrawMode === 'text') return;

            var rect = drawingCanvas.getBoundingClientRect();
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;

            var x = clientX - rect.left;
            var y = clientY - rect.top;

            currentPath.points.push(convertToLogical(x, y));
            redrawCanvas(); // Optimizable: could just draw the line segment instead of full redraw
            e.preventDefault();
        }

        function endDrawing(e) {
            isDrawingMouse = false;
            currentPath = null;
        }

        function redrawCanvas() {
            if (!drawingCtx) return;
            drawingCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);

            drawingCtx.lineCap = 'round';
            drawingCtx.lineJoin = 'round';

            window.sivoDrawings.forEach(function(item) {
                if (item.mode === 'text') {
                    drawingCtx.globalCompositeOperation = 'source-over';
                    drawingCtx.fillStyle = item.color;
                    var fontSize = 16 * (currentZoom || 1);
                    drawingCtx.font = fontSize + 'px system-ui, sans-serif';
                    var px = convertToPixel(item.point);
                    drawingCtx.fillText(item.text, px[0], px[1]);
                    return;
                }

                if (item.points.length < 2) return;

                drawingCtx.beginPath();
                if (item.mode === 'eraser') {
                    drawingCtx.globalCompositeOperation = 'destination-out';
                    drawingCtx.lineWidth = item.width;
                } else {
                    drawingCtx.globalCompositeOperation = 'source-over';
                    drawingCtx.strokeStyle = item.color;
                    // Scale width with zoom?
                    drawingCtx.lineWidth = item.width * (currentZoom || 1);
                }

                var startPx = convertToPixel(item.points[0]);
                drawingCtx.moveTo(startPx[0], startPx[1]);

                for (var i = 1; i < item.points.length; i++) {
                    var px = convertToPixel(item.points[i]);
                    drawingCtx.lineTo(px[0], px[1]);
                }

                drawingCtx.stroke();
            });
            drawingCtx.globalCompositeOperation = 'source-over';
        }

        if (drawingCanvas) {
            drawingCanvas.addEventListener('mousedown', startDrawing);
            drawingCanvas.addEventListener('mousemove', continueDrawing);
            drawingCanvas.addEventListener('mouseup', endDrawing);
            drawingCanvas.addEventListener('mouseleave', endDrawing);

            drawingCanvas.addEventListener('touchstart', startDrawing, {passive: false});
            drawingCanvas.addEventListener('touchmove', continueDrawing, {passive: false});
            drawingCanvas.addEventListener('touchend', endDrawing, {passive: false});
        }

        // Back Navigation Button functionality
        var backBtn = document.createElement('div');
        backBtn.innerHTML = `
            <svg style="width:16px; height:16px; margin-right:6px; vertical-align:middle;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span style="vertical-align:middle;">Back</span>
        `;
        backBtn.style.position = 'absolute';
        backBtn.style.top = '20px';
        backBtn.style.left = '20px';
        backBtn.style.padding = '10px 16px';
        backBtn.style.background = 'white';
        backBtn.style.border = '1px solid #eaeaea';
        backBtn.style.borderRadius = '20px'; // Pill shape
        backBtn.style.cursor = 'pointer';
        backBtn.style.display = 'none';
        backBtn.style.alignItems = 'center';
        backBtn.style.fontFamily = 'sans-serif';
        backBtn.style.fontSize = '14px';
        backBtn.style.fontWeight = '500';
        backBtn.style.color = '#333';
        backBtn.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
        backBtn.style.zIndex = '1000';
        backBtn.style.transition = 'background 0.2s, transform 0.1s';

        backBtn.addEventListener('mouseenter', () => backBtn.style.background = '#f9f9f9');
        backBtn.addEventListener('mouseleave', () => backBtn.style.background = 'white');
        backBtn.addEventListener('mousedown', () => backBtn.style.transform = 'scale(0.95)');
        backBtn.addEventListener('mouseup', () => backBtn.style.transform = 'scale(1)');

        document.getElementById('chart-container').appendChild(backBtn); // Append to chart container so flex layout doesn't break it

        backBtn.addEventListener('click', function() {
            if (viewHistory.length > 0) {
                var prevView = viewHistory.pop();
                renderView(prevView, true);
            }
        });

        // Watch history to toggle back button visibility
        setInterval(function() {
            if (viewHistory.length > 0) {
                backBtn.style.display = 'flex';
            } else {
                backBtn.style.display = 'none';
            }
        }, 100);

    </script>

    <script>
        var sivoGalleryModal = document.getElementById('sivo-gallery-modal');
        var sivoGalleryCloseBtn = document.getElementById('sivo-gallery-close');

        function closeSivoGalleryModal() {
            if (sivoGalleryModal) sivoGalleryModal.classList.remove('active');
        }

        if (sivoGalleryCloseBtn) sivoGalleryCloseBtn.addEventListener('click', closeSivoGalleryModal);

        // Implement loading animation triggering
        function triggerLoadingAnimation(elementId, action) {
            // Check if loading overlay already exists
            var existingOverlay = document.getElementById('sivo-loading-overlay-' + elementId);
            if (existingOverlay) return;

            var style = action.style || 'spinner';
            var text = action.text || 'Loading...';
            var duration = action.duration_ms || 2000;

            var loadingHtml = '';
            var bgStyle = 'background: rgba(255, 255, 255, 0.8); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; box-sizing: border-box;';

            if (style === 'spinner') {
                loadingHtml = `<div class="sivo-spinner"></div><div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'pulse') {
                loadingHtml = `<div class="sivo-anim-pulse" style="font-weight: bold; color: #38bdf8; font-size: 1.2em;">${text}</div>`;
            } else if (style === 'typewriter') {
                loadingHtml = `<div class="sivo-anim-typewriter" style="font-family: monospace; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'shimmer') {
                loadingHtml = `<div class="sivo-anim-shimmer" style="width: 80%; height: 20px; border-radius: 4px;"></div>`;
            } else if (style === 'glitch') {
                loadingHtml = `<div class="sivo-anim-glitch" style="font-weight: 900; color: #ff00ff; font-size: 1.2em; text-transform: uppercase;">${text}</div>`;
                bgStyle += ' background: rgba(0, 0, 0, 0.8);';
            } else if (style === 'matrix') {
                loadingHtml = `<div class="sivo-anim-matrix" style="font-family: monospace; font-weight: bold; font-size: 1.2em;">${text}</div>`;
                bgStyle += ' background: rgba(0, 0, 0, 0.9);';
            } else if (style === 'bouncing_dots') {
                loadingHtml = `<div><div class="sivo-anim-bounce sivo-anim-bounce1"></div><div class="sivo-anim-bounce sivo-anim-bounce2"></div><div class="sivo-anim-bounce"></div></div><div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'ripple') {
                loadingHtml = `<div class="sivo-anim-ripple"><div></div><div></div></div><div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'radar') {
                loadingHtml = `<div class="sivo-anim-radar"></div><div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'neon') {
                loadingHtml = `<div class="sivo-anim-neon" style="font-family: sans-serif; font-weight: bold;">${text}</div>`;
                bgStyle += ' background: rgba(0, 0, 0, 0.9);';
            } else if (style === 'typing_indicator') {
                loadingHtml = `<div style="font-weight: bold; color: #333; font-size: 1.2em;">${text}<span class="sivo-anim-typing"></span></div>`;
            } else if (style === 'progress_bar') {
                loadingHtml = `<div class="sivo-anim-progress-bar"></div><div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'heartbeat') {
                loadingHtml = `<div class="sivo-anim-heartbeat">♥</div><div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'slot_machine') {
                var reelHtml = '<div class="sivo-anim-slot-reel">';
                for(var i=0; i<10; i++) reelHtml += `<span>${Math.floor(Math.random() * 10)}</span>`;
                reelHtml += '</div>';

                loadingHtml = `
                    <div class="sivo-anim-slot-machine-wrapper">
                        <div class="sivo-anim-slot-machine">${reelHtml}</div>
                        <div class="sivo-anim-slot-machine" style="animation-delay: 0.1s;">${reelHtml.replace('sivo-anim-slot-reel', 'sivo-anim-slot-reel" style="animation-delay: -0.2s')}</div>
                        <div class="sivo-anim-slot-machine" style="animation-delay: 0.2s;">${reelHtml.replace('sivo-anim-slot-reel', 'sivo-anim-slot-reel" style="animation-delay: -0.4s')}</div>
                    </div>
                    <div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>
                `;
            } else if (style === 'orbit') {
                loadingHtml = `
                    <div class="sivo-anim-orbit-container">
                        <div class="sivo-anim-orbit-core"></div>
                        <div class="sivo-anim-orbit-satellite"></div>
                        <div class="sivo-anim-orbit-satellite"></div>
                        <div class="sivo-anim-orbit-satellite"></div>
                    </div>
                    <div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>
                `;
            } else if (style === 'breathe') {
                loadingHtml = `<div class="sivo-anim-breathe"></div><div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'liquid') {
                loadingHtml = `<div class="sivo-anim-liquid"></div><div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'flip') {
                loadingHtml = `<div class="sivo-anim-flip"></div><div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>`;
            } else if (style === 'blocks') {
                loadingHtml = `
                    <div class="sivo-anim-blocks-container">
                        <div class="sivo-anim-blocks"></div><div class="sivo-anim-blocks"></div><div class="sivo-anim-blocks"></div>
                        <div class="sivo-anim-blocks"></div><div class="sivo-anim-blocks"></div><div class="sivo-anim-blocks"></div>
                        <div class="sivo-anim-blocks"></div><div class="sivo-anim-blocks"></div><div class="sivo-anim-blocks"></div>
                    </div>
                    <div style="margin-top: 8px; font-weight: bold; color: #333;">${text}</div>
                `;
            }

            // Register temporary overlay
            overlaysData[elementId + '_loading'] = {
                html: `<div id="sivo-loading-overlay-${elementId}" style="${bgStyle}">${loadingHtml}</div>`,
                targetId: elementId,
                offset: [0, 0],
                scale_with_zoom: true
            };

            // Initialize the overlay DOM
            initOverlays();
            updateOverlaysPosition();

            // Handle completion after duration
            setTimeout(() => {
                if (action.completion_html) {
                    var completionBgStyle = 'background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(4px); border-radius: 8px; border: 1px solid #e2e8f0; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.1);';
                    overlaysData[elementId + '_loading'].html = `<div id="sivo-loading-overlay-${elementId}" style="${completionBgStyle}">${action.completion_html}</div>`;
                } else {
                    delete overlaysData[elementId + '_loading'];
                }

                if (action.completion_color) {
                    var currentOption = myChart.getOption();
                    var seriesData = currentOption.series[0].data;
                    var updated = false;
                    for (var i = 0; i < seriesData.length; i++) {
                        if (seriesData[i].name === elementId) {
                            if (!seriesData[i].itemStyle) seriesData[i].itemStyle = {};
                            seriesData[i].itemStyle.areaColor = action.completion_color;
                            updated = true;
                        }
                    }
                    if (updated) {
                        myChart.setOption({ series: [{ data: seriesData }] });
                    }
                }

                initOverlays();
                updateOverlaysPosition();
            }, duration);
        }

        // Helper to update gallery image
        function sivoUpdateGallery(src, dotEl) {
            var wrapper = document.getElementById('sivo-gallery-wrapper');
            if(wrapper) {
                var img = wrapper.querySelector('img');
                if(img) img.src = src;

                // update dots
                var dots = wrapper.querySelectorAll('span');
                dots.forEach(d => d.style.background = '#555');
                dotEl.style.background = 'white';
            }
        }

        // Helper to submit forms
        function sivoSubmitForm(elementId, eventName, formEl) {
            var formData = new FormData(formEl);
            var payload = {};
            formData.forEach(function(value, key){
                payload[key] = value;
            });

            console.log('Form submitted:', payload);
            window.parent.postMessage({
                type: 'sivo_click',
                payload: {
                    element_id: elementId,
                    event_name: eventName,
                    data: payload
                }
            }, '*');

            // Show success message
            formEl.innerHTML = '<div style="color:green; text-align:center; padding:10px;">Submitted successfully!</div>';
        }
    </script>

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
    <div id="sivo-video-modal">
        <div style="position: relative; width: 80%; max-width: 800px;">
            <span class="sivo-video-close" id="sivo-video-close">&times;</span>
            <div class="sivo-video-content">
                <div class="sivo-video-container" id="sivo-video-wrapper"></div>
            </div>
        </div>
    </div>
    <script>
        var sivoVideoModal = document.getElementById('sivo-video-modal');
        var sivoVideoCloseBtn = document.getElementById('sivo-video-close');
        var sivoVideoWrapper = document.getElementById('sivo-video-wrapper');

        function closeSivoVideoModal() {
            if (sivoVideoModal) {
                sivoVideoModal.classList.remove('active');
                if (sivoVideoWrapper) sivoVideoWrapper.innerHTML = '';
            }
        }

        if (sivoVideoCloseBtn) sivoVideoCloseBtn.addEventListener('click', closeSivoVideoModal);
        if (sivoVideoModal) {
            sivoVideoModal.addEventListener('click', function(e) {
                if (e.target === sivoVideoModal) {
                    closeSivoVideoModal();
                }
            });
        }
    </script>

</body>
</html>
