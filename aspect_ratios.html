<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SIVO Interactive Graphic</title>


    <!-- Include ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Include echarts-stat -->
    <script src="https://cdn.jsdelivr.net/npm/echarts-stat@1.2.0/dist/ecStat.min.js"></script>
    <!-- Include echarts-wordcloud -->
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
    <!-- Include echarts-liquidfill -->
    <script src="https://cdn.jsdelivr.net/npm/echarts-liquidfill@3.1.0/dist/echarts-liquidfill.min.js"></script>
    <!-- Include DOMPurify -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <!-- Include marked.js for Markdown Action -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Include lottie-player for Lottie animations -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <!-- Include canvas-confetti for gamification effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <!-- Include jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            display: flex;
            height: 100vh;
        }
        #sivo-app-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0; left: 0;
            overflow: hidden;
        }

        #sivo-background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            display: none;
            pointer-events: none;
        }

        #sivo-border-image {
            position: absolute;
            object-fit: cover;
            z-index: -1;
            display: none;
            pointer-events: none;
        }

        #chart-wrapper {
            position: relative;
            flex: 1;
            height: 100%;
            width: 100%;
            touch-action: none;
        }
        #chart-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            touch-action: none;
        }

        #chart-container-compare-right {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            display: none;
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }

        #sivo-compare-slider-ui {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            cursor: ew-resize;
            z-index: 101;
            display: none;
            transform: translateX(-50%);
        }
        #sivo-compare-slider-ui::after {
            content: "↔";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            border: 2px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #sivo-ambient-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            display: none;
        }

        #sivo-drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        #sivo-drawing-toolbar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none;
            flex-direction: row;
            gap: 8px;
            align-items: center;
        }

        .sivo-drawing-btn {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s;
        }

        .sivo-drawing-btn:hover {
            background: #f1f5f9;
        }

        .sivo-drawing-btn.active {
            background: #e2e8f0;
            border-color: #cbd5e1;
            color: #0f172a;
        }

        #sivo-drawing-color {
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
        }

        #sivo-drawing-color::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        #sivo-drawing-color::-webkit-color-swatch {
            border: none;
        }

        .sivo-view-transition-out {
            opacity: 0 !important;
            transform: scale(0.95);
        }

        .sivo-view-transition-in {
            opacity: 1 !important;
            transform: scale(1);
        }

        /* Slide Left Transition */
        .sivo-view-transition-slide-left-out {
            opacity: 0 !important;
            transform: translateX(-100%);
        }
        .sivo-view-transition-slide-left-in {
            opacity: 1 !important;
            transform: translateX(0);
        }

        /* Slide Right Transition */
        .sivo-view-transition-slide-right-out {
            opacity: 0 !important;
            transform: translateX(100%);
        }
        .sivo-view-transition-slide-right-in {
            opacity: 1 !important;
            transform: translateX(0);
        }

        /* Slide Up Transition */
        .sivo-view-transition-slide-up-out {
            opacity: 0 !important;
            transform: translateY(-100%);
        }
        .sivo-view-transition-slide-up-in {
            opacity: 1 !important;
            transform: translateY(0);
        }

        /* Slide Down Transition */
        .sivo-view-transition-slide-down-out {
            opacity: 0 !important;
            transform: translateY(100%);
        }
        .sivo-view-transition-slide-down-in {
            opacity: 1 !important;
            transform: translateY(0);
        }

        /* Flip Transition */
        .sivo-view-transition-flip-out {
            opacity: 0 !important;
            transform: perspective(1000px) rotateY(-90deg);
        }
        .sivo-view-transition-flip-in {
            opacity: 1 !important;
            transform: perspective(1000px) rotateY(0deg);
        }

        /* Page Turn Transition */
        .sivo-view-transition-page-turn-out {
            opacity: 0 !important;
            transform-origin: left center;
            transform: perspective(1500px) rotateY(-90deg);
        }
        .sivo-view-transition-page-turn-in {
            opacity: 1 !important;
            transform-origin: left center;
            transform: perspective(1500px) rotateY(0deg);
        }

        #sivo-title-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
            max-width: 400px;
            display: none;
            pointer-events: auto;
            cursor: move;
        }

        #sivo-title {
            margin: 0 0 4px 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }

        #sivo-subtitle {
            margin: 0;
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.4;
        }

        #sivo-attribution {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #64748b;
            border: 1px solid #e2e8f0;
            display: none;
            pointer-events: auto;
            cursor: move;
        }

        #scrollytelling-container {
            display: none;
            width: 400px;
            height: 100vh;
            overflow-y: scroll;
            background: #fff;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 20;
            scroll-behavior: smooth;
        }
        .scrolly-step {
            padding: 50vh 20px;
            margin: 0;
            opacity: 0.3;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
        }
        .scrolly-step.active {
            opacity: 1;
            transform: translateY(0);
        }
        .scrolly-step-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        #tour-container {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 1000;
            text-align: center;
            max-width: 450px;
            border: 1px solid #f1f5f9;
        }
        #tour-content {
            margin-bottom: 15px;
        }
        .tour-controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .tour-btn {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .tour-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .tour-btn:hover:not(:disabled) {
            background: #0056b3;
        }
        #minimap-container {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            overflow: hidden;
            pointer-events: none;
        }
        #minimap-svg {
            width: 100%;
            height: 100%;
        }
        #minimap-viewport {
            position: absolute;
            border: 2px solid #007bff;
            background: rgba(0, 123, 255, 0.2);
            box-sizing: border-box;
            transition: all 0.1s ease;
        }

        #sivo-search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            max-width: 90%;
            z-index: 1000;
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: move;
        }

        #sivo-search-container:focus-within {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #38bdf8;
        }

        #sivo-search-input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 12px 20px 12px 40px;
            font-size: 15px;
            color: #334155;
            outline: none;
            border-radius: 24px;
            box-sizing: border-box;
        }

        .sivo-search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #94a3b8;
            pointer-events: none;
        }

        #sivo-search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
        }

        .sivo-search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
        }

        .sivo-search-result-item:last-child {
            border-bottom: none;
        }

        .sivo-search-result-item:hover, .sivo-search-result-item.active {
            background: #f8fafc;
        }

        .sivo-search-result-title {
            font-weight: 600;
            color: #0f172a;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .sivo-search-result-subtitle {
            font-size: 12px;
            color: #64748b;
        }

        #sivo-context-menu {
            position: absolute;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-width: 160px;
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 8px 0;
        }

        .sivo-context-menu-item {
            padding: 10px 16px;
            font-size: 14px;
            color: #334155;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .sivo-context-menu-item:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        #sivo-geocoder-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            max-width: 90%;
            z-index: 1000;
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.3s ease, border-color 0.3s ease, top 0.3s ease;
            cursor: text;
        }

        #sivo-geocoder-container:focus-within {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #38bdf8;
        }

        #sivo-geocoder-input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 12px 20px 12px 40px;
            font-size: 15px;
            color: #334155;
            outline: none;
            border-radius: 24px;
            box-sizing: border-box;
        }

        .sivo-geocoder-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #94a3b8;
            pointer-events: none;
        }

        .sivo-geocoder-spinner {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #38bdf8;
            border-radius: 50%;
            animation: sivo-spin 1s linear infinite;
            display: none;
            pointer-events: none;
        }

        #sivo-geocoder-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
        }


        #sivo-watermark-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: none;
            opacity: 0.8;
            pointer-events: auto;
            transition: opacity 0.3s;
            cursor: move;
        }

        #sivo-watermark-container:hover {
            opacity: 1.0;
        }

        #layer-legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            z-index: 1000;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
            color: #334155;
            font-size: 14px;
            cursor: move;
        }

        /* Layer Switch Styles */
        .layer-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
            justify-content: space-between;
        }
        .layer-toggle input {
            display: none;
        }
        .sivo-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background-color: #cbd5e1;
            border-radius: 20px;
            transition: 0.3s;
            margin-left: 12px;
        }
        .sivo-switch::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            background-color: white;
            transition: 0.3s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .layer-toggle input:checked + .sivo-switch {
            background-color: #3b82f6;
        }
        .layer-toggle input:checked + .sivo-switch::before {
            transform: translateX(16px);
        }

        #info-panel {
            background: #ffffff;
            display: none;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
            z-index: 1000;
        }
        #info-panel.active {
            display: flex;
        }

        .info-panel-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px;
            background: #ffffff;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .info-panel-content {
            padding: 32px 24px;
            overflow-y: auto;
            flex: 1;
        }

        /* Improved typography inside info panel content */
        .info-panel-content h1, .info-panel-content h2, .info-panel-content h3 {
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
            line-height: 1.2;
        }

        .info-panel-content h3 {
            font-size: 1.25rem;
        }

        .info-panel-content p {
            margin-top: 0;
            margin-bottom: 16px;
        }

        /* Layout modifiers for info-panel */
        #info-panel.pos-right {
            width: 360px;
            height: 100%;
            border-left: 1px solid #e2e8f0;
            box-shadow: -10px 0 25px -5px rgba(0, 0, 0, 0.05);
        }
        #info-panel.pos-left {
            width: 360px;
            height: 100%;
            border-right: 1px solid #e2e8f0;
            box-shadow: 10px 0 25px -5px rgba(0, 0, 0, 0.05);
        }
        #info-panel.pos-bottom {
            width: 100%;
            height: 300px;
            border-top: 1px solid #ddd;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        #info-panel.pos-top {
            width: 100%;
            height: 300px;
            border-bottom: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        #info-panel.pos-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            z-index: 1050;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform-origin: bottom center;
        }

        @keyframes sivo-overlay-roll-in {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) perspective(1500px) rotateX(-15deg) translateY(10%);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) perspective(1500px) rotateX(0deg) translateY(0);
            }
        }

        @keyframes sivo-overlay-roll-out {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) perspective(1500px) rotateX(0deg) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) perspective(1500px) rotateX(-15deg) translateY(10%);
            }
        }

        #info-panel.pos-overlay.active {
            animation: sivo-overlay-roll-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #info-panel.pos-overlay.closing {
            animation: sivo-overlay-roll-out 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Responsive Layout Overrides */
        .mobile-handle {
            display: none;
            width: 40px;
            height: 4px;
            background: #cbd5e1;
            border-radius: 4px;
            margin: 8px auto 0;
        }
        @media (max-width: 768px) {
            .mobile-handle {
                display: block !important;
            }
            body, #sivo-app-container {
                flex-direction: column !important;
                padding-bottom: env(safe-area-inset-bottom);
            }

        /* Standard SIVO Animations */
        @keyframes sivo-spin {

        @keyframes sivo-ripple {

            // Check if the clicked target has data-draggable true
            var target = e.target;
            if (target && target.closest) {
                target = target.closest('[data-draggable="true"]');
            }
            if (target && target.getAttribute('data-draggable') === 'true') {
                e.stopPropagation(); // Stop ECharts from getting the mousedown and starting a pan

                draggedElement = target;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                window.isDraggingElement = true; // prevent click immediately after drag

                // Parse existing transform translation
                var currentTransform = target.getAttribute('transform') || '';
                var translateMatch = currentTransform.match(/translate\(([-\d.]+)[ ,]([-\d.]+)\)/);
                if (translateMatch) {
                    currentElementX = parseFloat(translateMatch[1]);
                    currentElementY = parseFloat(translateMatch[2]);
                } else {
                    currentElementX = 0;
                    currentElementY = 0;

        window.addEventListener('mousemove', function (e) {

                // Account for global ECharts zoom level so it drags 1:1 with mouse
                var zoomLevel = currentZoom || 1;
                dx = dx / zoomLevel;
                dy = dy / zoomLevel;

                var newX = currentElementX + dx;
                var newY = currentElementY + dy;

                currentTransform = currentTransform.replace(/translate\([^)]+\)/g, '').trim();

                var newTransform = 'translate(' + newX + ' ' + newY + ') ' + currentTransform;

                                } else if (clientX === undefined && e.touches && e.touches.length > 0) {

                                }

                                    y = clientY / window.innerHeight;
                                }
                            }

                                spread: action.spread || 70,
                                origin: { x: x, y: y },

                            });

                    } else if (action.action_type === 'callback') {

        // Handle hover events

                if (payload.command === 'zoom_to') {
                    var elementId = payload.element_id;
                    var zoomLevel = payload.zoom || 2;

                    // We need to find the element in the map data to get its bounding box or center
                    // ECharts geo doesn't perfectly expose region centers programmatically easily,

                    myChart.dispatchAction({

                        var style = document.createElement('style');
                        style.innerHTML = payload.css;
                        document.head.appendChild(style);

                    if (payload.js) {
                        var script = document.createElement('script');

        // --- Resizer Logic ---
        (function() {
            const resizer = document.getElementById('sivo-resizer');
            const panel = document.getElementById('info-panel');
            let isResizing = false;
            let currentLayout = 'row'; // depends on flex-direction
            let lastDownX = 0;
            let lastDownY = 0;

            let startHeight = 0;

            resizer.addEventListener('mousedown', function(e) {

                let overlay = document.createElement('div');
                overlay.id = 'sivo-drag-overlay';
                overlay.style.position = 'fixed';
                overlay.style.top = 0;
                overlay.style.left = 0;
                overlay.style.right = 0;
                overlay.style.bottom = 0;

                e.preventDefault();

            window.addEventListener('mousemove', function(e) {
                if (!isResizing) return;

                if (currentLayout === 'row') {

                    panel.style.width = newWidth + 'px';
                } else if (currentLayout === 'row-reverse') {
                    // Left panel
                    let newWidth = startWidth + (e.clientX - lastDownX);
                    panel.style.width = newWidth + 'px';
                } else if (currentLayout === 'column') {
                    // Bottom panel
                    let newHeight = startHeight - (e.clientY - lastDownY);
                    panel.style.height = newHeight + 'px';
                } else if (currentLayout === 'column-reverse') {
                    // Top panel
                    let newHeight = startHeight + (e.clientY - lastDownY);
                    panel.style.height = newHeight + 'px';
                }

                // Throttle resize event for performance if needed, but modern ECharts usually handles it
                myChart.resize();

        function initOverlays() {

        // Ambient Effects Logic
        var ambientCanvas = document.getElementById('sivo-ambient-canvas');
        var ambientCtx = ambientCanvas ? ambientCanvas.getContext('2d') : null;
        var ambientParticles = [];
        var ambientAnimFrame = null;

        function initAmbientEffects(view) {
            if (ambientAnimFrame) {
                cancelAnimationFrame(ambientAnimFrame);
                ambientAnimFrame = null;
            }
            ambientParticles = [];

            if (!view.ambient_effect || !ambientCanvas) {
                if (ambientCanvas) ambientCanvas.style.display = 'none';
                return;
            }

            ambientCanvas.style.display = 'block';
            var rect = chartDom.getBoundingClientRect();
            ambientCanvas.width = rect.width;
            ambientCanvas.height = rect.height;

            var count = 100;
            var type = view.ambient_effect.toLowerCase(); // 'snow', 'rain', 'particles', 'fireflies', 'summer', 'winter', 'spring', 'fall', 'wind', 'water', 'plants', 'tree'
            var speedMultiplier = view.ambient_speed !== undefined ? view.ambient_speed : 1.0;

            for (var i = 0; i < count; i++) {
                var r = Math.random() * 3 + 1;
                if (type === 'snow' || type === 'winter') {
                    r = Math.random() * 4 + 1;
                } else if (type === 'rain') {
                    r = Math.random() * 1 + 1;
                } else if (type === 'fireflies' || type === 'summer') {
                    r = Math.random() * 3 + 1;
                } else if (type === 'spring') {
                    r = Math.random() * 4 + 3; // petals
                } else if (type === 'fall') {
                    r = Math.random() * 5 + 4; // leaves
                } else if (type === 'wind') {
                    r = Math.random() * 4 + 2; // leaves and streaks
                } else if (type === 'water') {
                    r = Math.random() * 2 + 1; // wave particles
                } else if (type === 'plants' || type === 'tree') {
                    r = Math.random() * 3 + 1;
                }

                var colorPalette = [];
                if (type === 'spring') {
                    colorPalette = ['#ffb7c5', '#ffc0cb', '#ff69b4', '#ff1493'];
                } else if (type === 'fall') {
                    colorPalette = ['#d9534f', '#f0ad4e', '#c9302c', '#ec971f', '#8a6d3b'];
                } else if (type === 'wind') {
                    colorPalette = ['#c9302c', '#ec971f', '#8a6d3b', '#ffffff', '#ffffff']; // mostly streaks (white/grey) and some leaves
                } else if (type === 'water') {
                    colorPalette = ['#4da6ff', '#80bfff', '#b3d9ff', '#ffffff'];
                } else if (type === 'plants' || type === 'tree') {
                    colorPalette = ['#2ca02c', '#98df8a', '#8c564b']; // greens and browns
                }
                var selectedColor = colorPalette.length > 0 ? colorPalette[Math.floor(Math.random() * colorPalette.length)] : null;

                ambientParticles.push({
                    x: Math.random() * ambientCanvas.width,
                    y: Math.random() * ambientCanvas.height,
                    r: r,
                    d: Math.random() * count, // density / speed
                    opacity: Math.random(),
                    angle: Math.random() * 360,
                    spin: (Math.random() - 0.5) * 5,
                    life: Math.random() * 100, // For tree/plants growth
                    color: selectedColor
                });
            }

            function drawAmbient() {
                ambientCtx.clearRect(0, 0, ambientCanvas.width, ambientCanvas.height);

                for (var i = 0; i < count; i++) {
                    var p = ambientParticles[i];
                    ambientCtx.beginPath();

                    if (type === 'snow' || type === 'winter') {
                        ambientCtx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                    } else if (type === 'wind') {
                        if (p.color === '#ffffff') {
                            ambientCtx.fillStyle = `rgba(200, 200, 200, ${p.opacity * 0.5})`;
                            ambientCtx.fillRect(p.x, p.y, p.r * 8, 1); // wind streaks
                        } else {
                            ambientCtx.fillStyle = p.color;
                            ambientCtx.globalAlpha = p.opacity;
                            ambientCtx.ellipse(p.x, p.y, p.r, p.r * 0.5, p.angle * Math.PI / 180, 0, Math.PI * 2);
                            ambientCtx.globalAlpha = 1.0;
                        }
                    } else if (type === 'water') {
                        ambientCtx.strokeStyle = p.color;
                        ambientCtx.globalAlpha = p.opacity;
                        ambientCtx.lineWidth = p.r * 1.5;
                        // Draw a longer continuous wave segment to look more like a river
                        ambientCtx.beginPath();
                        ambientCtx.moveTo(p.x, p.y);
                        ambientCtx.quadraticCurveTo(p.x + p.r * 15, p.y - p.r * 8, p.x + p.r * 30, p.y);
                        ambientCtx.quadraticCurveTo(p.x + p.r * 45, p.y + p.r * 8, p.x + p.r * 60, p.y);
                        ambientCtx.quadraticCurveTo(p.x + p.r * 75, p.y - p.r * 8, p.x + p.r * 90, p.y);
                        ambientCtx.stroke();
                        ambientCtx.globalAlpha = 1.0;
                        continue; // skip the default fill below since we stroked
                    } else if (type === 'plants' || type === 'tree') {
                        ambientCtx.fillStyle = p.color;
                        ambientCtx.globalAlpha = Math.min(1.0, p.life / 50.0) * p.opacity;
                        ambientCtx.arc(p.x, p.y, p.r * (Math.min(50, p.life)/50.0), 0, Math.PI * 2, true);
                        ambientCtx.globalAlpha = 1.0;
                    } else if (type === 'rain') {
                        ambientCtx.fillStyle = `rgba(150, 180, 255, ${p.opacity})`;
                        ambientCtx.fillRect(p.x, p.y, p.r, p.r * 10); // long streaks
                    } else if (type === 'fireflies' || type === 'summer') {
                        ambientCtx.fillStyle = `rgba(255, 255, 100, ${Math.sin(Date.now()/500 + p.d)*0.5 + 0.5})`;
                        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                        ambientCtx.shadowBlur = 10;
                        ambientCtx.shadowColor = "yellow";
                    } else if (type === 'spring' || type === 'fall') {
                        ambientCtx.save();
                        ambientCtx.translate(p.x, p.y);
                        ambientCtx.rotate(p.angle * Math.PI / 180);
                        ambientCtx.globalAlpha = p.opacity;
                        ambientCtx.fillStyle = p.color;

                        if (type === 'spring') {
                            // Petal shape (ellipse)
                            ambientCtx.ellipse(0, 0, p.r, p.r * 0.6, 0, 0, Math.PI * 2);
                        } else {
                            // Leaf shape (rough ellipse with slight point)
                            ambientCtx.ellipse(0, 0, p.r, p.r * 0.8, 0, 0, Math.PI * 2);
                        }

                        ambientCtx.fill();
                        ambientCtx.restore();
                        continue; // skip the default fill below since we restored
                    } else { // generic particles
                        ambientCtx.fillStyle = `rgba(100, 100, 100, ${p.opacity})`;
                        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                    }

                    ambientCtx.fill();
                    ambientCtx.shadowBlur = 0;
                }
                updateAmbient();
                ambientAnimFrame = requestAnimationFrame(drawAmbient);
            }

            function updateAmbient() {
                for (var i = 0; i < count; i++) {
                    var p = ambientParticles[i];

                    if (type === 'snow' || type === 'winter') {
                        p.y += (Math.cos(p.d) + 1 + p.r / 2) * speedMultiplier;
                        p.x += (Math.sin(p.d) * 2) * speedMultiplier;
                    } else if (type === 'rain') {
                        p.y += (10 + p.r) * speedMultiplier;
                    } else if (type === 'wind') {
                        p.x += (15 + p.r * 2) * speedMultiplier; // Move fast horizontally
                        p.y += Math.sin(p.d) * 2 * speedMultiplier;
                        p.angle += p.spin * speedMultiplier;
                    } else if (type === 'water') {
                        p.x += (3 + p.r) * speedMultiplier; // Flow horizontally
                        p.y += Math.sin(p.x / 20 + p.d) * speedMultiplier; // Bob up and down
                    } else if (type === 'plants' || type === 'tree') {
                        p.life += speedMultiplier;
                        p.y -= 0.5 * speedMultiplier; // Grow upwards slowly
                        p.x += Math.sin(p.life / 10 + p.d) * 0.5 * speedMultiplier; // Sway
                    } else if (type === 'fireflies' || type === 'summer') {
                        p.y += Math.sin(Date.now()/1000 + p.d) * 0.5 * speedMultiplier;
                        p.x += Math.cos(Date.now()/1000 + p.d) * 0.5 * speedMultiplier;
                    } else if (type === 'spring' || type === 'fall') {
                        p.y += (Math.cos(p.d) + 1 + p.r / 3) * speedMultiplier;
                        p.x += (Math.sin(p.d) * 1.5) * speedMultiplier;
                        p.angle += p.spin * speedMultiplier;
                    } else {
                        p.y -= 1 * speedMultiplier; // float up
                        p.x += (Math.sin(p.d) * 0.5) * speedMultiplier;
                    }

                    // wrap around
                    if (p.x > ambientCanvas.width + 15 || p.x < -15 || p.y > ambientCanvas.height + 15 || p.y < -15) {
                        if (type === 'particles' || type === 'fireflies' || type === 'summer' || type === 'plants' || type === 'tree') {
                             if (p.y < -15) p.y = ambientCanvas.height + 15;
                             if (p.x > ambientCanvas.width + 15) p.x = -15;
                             if (p.x < -15) p.x = ambientCanvas.width + 15;
                             if (type === 'plants' || type === 'tree') p.life = 0;
                        } else {
                            if (type === 'wind' || type === 'water') {
                                ambientParticles[i] = {x: -15, y: Math.random() * ambientCanvas.height, r: p.r, d: p.d, opacity: p.opacity, angle: p.angle, spin: p.spin, color: p.color, life: 0};
                            } else if (Math.random() > 0.3) {
                                ambientParticles[i] = {x: Math.random() * ambientCanvas.width, y: -15, r: p.r, d: p.d, opacity: p.opacity, angle: p.angle, spin: p.spin, color: p.color, life: 0};
                            } else {
                                // Enter from right
                                ambientParticles[i] = {x: -15, y: Math.random() * ambientCanvas.height, r: p.r, d: p.d, opacity: p.opacity, angle: p.angle, spin: p.spin, color: p.color, life: 0};
                            }
                        }
                    }
                }
            }

            drawAmbient();
        }

        function updateOverlaysPosition() {
            var zoomLevel = currentZoom;

            for (const [id, overlayObj] of Object.entries(overlayElements)) {
                var targetId = overlayObj.data.targetId || id;
                if (overlayObj.data.fixed) {
                    // Fixed positioned overlays (like legends)
                    overlayObj.dom.style.position = 'absolute';
                    if (overlayObj.data.position === 'bottom-left') {
                        overlayObj.dom.style.bottom = '20px';
                        overlayObj.dom.style.left = '20px';
                    }
                    overlayObj.dom.style.display = 'block';
                    continue;
                }

                var coord = overlayObj.data.coord; // [x, y] in SVG map coordinates
                var offset = overlayObj.data.offset; // [x, y] pixel offset

                var bboxPixel = null; // {x, y, w, h}

                try {
                    var model = myChart.getModel().getSeriesByIndex(0);
                    var geo = model.coordinateSystem;
                    if (geo && geo.regions) {
                        var region = geo.regions.find(r => r.name === targetId);
                        if (region && region._elOnlyForCalculate) {
                            var zrender_el = region._elOnlyForCalculate;
                            var bBox = zrender_el.getBoundingRect();

                            // get global bounding rect directly using the element's built-in global transform function
                            var tl = zrender_el.transformCoordToGlobal(bBox.x, bBox.y);
                            var br = zrender_el.transformCoordToGlobal(bBox.x + bBox.width, bBox.y + bBox.height);

                            bboxPixel = {
                                x: Math.min(tl[0], br[0]),
                                y: Math.min(tl[1], br[1]),
                                w: Math.abs(br[0] - tl[0]),
                                h: Math.abs(br[1] - tl[1])
                            };
                        }
                    }
                } catch (e) {
                    bboxPixel = null;
                }

                // Fallback to python bbox coordinates mapping if ZRender fails
                if (!bboxPixel && overlayObj.data.bbox) {
                    var bbox = overlayObj.data.bbox; // [xmin, ymin, xmax, ymax]
                    var tl = myChart.convertToPixel({seriesIndex: 0}, [bbox[0], bbox[1]]);
                    var br = myChart.convertToPixel({seriesIndex: 0}, [bbox[2], bbox[3]]);

                    if (tl && br) {
                        bboxPixel = {
                            x: tl[0],
                            y: tl[1],
                            w: br[0] - tl[0],
                            h: br[1] - tl[1]
                        };
                    }
                }

                if (bboxPixel) {
                    overlayObj.dom.style.left = (bboxPixel.x + offset[0]) + 'px';
                    overlayObj.dom.style.top = (bboxPixel.y + offset[1]) + 'px';
                    overlayObj.dom.style.width = bboxPixel.w + 'px';
                    overlayObj.dom.style.height = bboxPixel.h + 'px';

                    // Center within the precise bounding box without transform translation hacks
                    overlayObj.dom.style.transform = 'none';

                    if (overlayObj.data.scale_with_zoom) {
                        // Not needed usually, but keeping for compatibility if someone expects a scale transform
                    }

                    overlayObj.dom.style.display = 'flex'; // Use flex to allow internal content to center
                    overlayObj.dom.style.alignItems = 'center';
                    overlayObj.dom.style.justifyContent = 'center';
                } else {
                    // Fallback to center-point logic if bounding box could not be determined
                    var pixel = myChart.convertToPixel({seriesIndex: 0}, coord);
                    if (pixel) {
                        overlayObj.dom.style.left = (pixel[0] + offset[0]) + 'px';
                        overlayObj.dom.style.top = (pixel[1] + offset[1]) + 'px';
                        overlayObj.dom.style.transform = 'translate(-50%, -50%)';
                        overlayObj.dom.style.display = 'flex';
                        overlayObj.dom.style.alignItems = 'center';
                        overlayObj.dom.style.justifyContent = 'center';
                    } else {
                        overlayObj.dom.style.display = 'none';
                    }
                }
            }
        }

        function initScratchoff(view) {
            var canvas = document.getElementById('sivo-scratchoff-canvas');
            if (!view.scratchoff) {
                canvas.style.display = 'none';
                return;
            }

            canvas.style.display = 'block';
            canvas.style.pointerEvents = 'auto'; // allow scratching
            canvas.style.touchAction = 'none'; // prevent native scrolling while scratching
            var ctx = canvas.getContext('2d');

            // Resize canvas to match container
            function resizeCanvas() {
                var rect = chartDom.getBoundingClientRect();

                // Save current canvas state to preserve scratch progress on resize
                var tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width || rect.width;
                tempCanvas.height = canvas.height || rect.height;
                var tempCtx = tempCanvas.getContext('2d');
                if (canvas.width && canvas.height) {
                    tempCtx.drawImage(canvas, 0, 0);
                }

                canvas.width = rect.width;
                canvas.height = rect.height;

                if (canvas.width > 0 && canvas.height > 0) {
                    fillCanvas(tempCanvas);
                }
            }

            function fillCanvas(savedStateCanvas) {
                if (view.scratchoff.image_url) {
                    var img = new Image();
                    img.crossOrigin = 'Anonymous';
                    img.onload = function() {
                        // Draw image to cover
                        var scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                        var x = (canvas.width / 2) - (img.width / 2) * scale;
                        var y = (canvas.height / 2) - (img.height / 2) * scale;
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                        if (savedStateCanvas && savedStateCanvas.width) {
                            ctx.globalCompositeOperation = 'destination-out';
                            ctx.drawImage(savedStateCanvas, 0, 0);
                        }
                    };
                    img.src = view.scratchoff.image_url;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = view.scratchoff.color || '#cccccc';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    if (savedStateCanvas && savedStateCanvas.width) {
                        ctx.globalCompositeOperation = 'destination-out';
                        ctx.drawImage(savedStateCanvas, 0, 0);
                    }
                }
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            var isDrawing = false;
            var brushSize = view.scratchoff.brush_size || 40;

            function scratch(e) {
                if (!isDrawing) return;
                var rect = canvas.getBoundingClientRect();
                var clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
                var clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;

                var x = clientX - rect.left;
                var y = clientY - rect.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, brushSize, 0, Math.PI * 2, false);
                ctx.fill();

                // Check how much is scratched off to potentially disable pointer-events completely
                // (Too expensive to do every frame, maybe every N frames)
            }

            canvas.addEventListener('mousedown', function(e) {
                isDrawing = true;
                scratch(e);
            });
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('mouseup', function() { isDrawing = false; });
            canvas.addEventListener('mouseleave', function() { isDrawing = false; });

            // Touch support
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                e.stopPropagation();
                isDrawing = true;
                scratch(e);
            }, { passive: false });
            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
                e.stopPropagation();
                scratch(e);
            }, { passive: false });
            canvas.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                isDrawing = false;
            }, { passive: false });
        }


        var scrollyAudioEnabled = false;

        function initScrollytelling(steps) {
            var container = document.getElementById('scrollytelling-container');
            if (!steps || steps.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            container.innerHTML = '';

            var hasAudio = steps.some(s => s.audio_url);

            if (hasAudio) {
                // Add an explicit 'Enable Audio' button for the first interaction to satisfy browser autoplay policies
                var audioStartCard = document.createElement('div');
                audioStartCard.className = 'scrolly-step';
                audioStartCard.style.padding = '20vh 20px'; // Less padding so it's visible immediately
                audioStartCard.innerHTML = `
                    <div class="scrolly-step-card" style="text-align: center;">
                        <h3 style="margin-top:0;">Enable Audio Experience</h3>
                        <p style="margin-bottom:15px; color:#666;">This narrative includes audio narration. Click the button below to allow playback as you scroll.</p>
                        <button id="sivo-enable-audio-btn" style="background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:16px; transition:background 0.2s;">
                            Start Experience
                        </button>
                    </div>
                `;
                container.appendChild(audioStartCard);
            }

            steps.forEach(function(step, index) {
                var stepWrapper = document.createElement('div');
                stepWrapper.className = 'scrolly-step';
                stepWrapper.setAttribute('data-index', index);

                var stepCard = document.createElement('div');
                stepCard.className = 'scrolly-step-card';
                stepCard.innerHTML = step.content;
                stepWrapper.appendChild(stepCard);

                if (index === steps.length - 1) {
                    stepWrapper.style.paddingBottom = '80vh';
                }
                container.appendChild(stepWrapper);
            });

            if (hasAudio) {
                var enableBtn = document.getElementById('sivo-enable-audio-btn');
                if (enableBtn) {
                    enableBtn.addEventListener('click', function() {
                        scrollyAudioEnabled = true;

                        // Play and immediately pause a silent dummy audio to unlock the audio context for this page
                        var dummyAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=");
                        dummyAudio.play().then(() => {
                            dummyAudio.pause();
                        }).catch(e => console.log("Dummy audio unlock skipped", e));

                        enableBtn.innerText = 'Audio Enabled ✓';
                        enableBtn.style.background = '#10b981'; // Green
                        setTimeout(() => {
                            // Smooth scroll to the first actual step
                            var firstStep = container.querySelector('.scrolly-step[data-index="0"]');
                            if (firstStep) {
                                firstStep.scrollIntoView({ behavior: 'smooth' });
                            }
                        }, 500);
                    });
                }
            }

            var observerOptions = { root: container, rootMargin: '-50% 0px -50% 0px', threshold: 0 };
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var index = parseInt(entry.target.getAttribute('data-index'), 10);
                        if (isNaN(index)) return; // Ignore the Start Experience card

                        var step = steps[index];

                        document.querySelectorAll('.scrolly-step').forEach(el => el.classList.remove('active'));
                        entry.target.classList.add('active');

                        // Close info panel to ensure map is visible during narrative changes
                        closePanel();

                        // Handle Audio
                        if (scrollyAudioEnabled || !hasAudio) {
                            if (currentAudio) {
                                currentAudio.pause();
                                currentAudio.currentTime = 0;
                            }
                            if (step.audio_url) {
                                currentAudio = new Audio(step.audio_url);
                                currentAudio.play().catch(e => console.error("Audio playback failed:", e));
                            }
                        }

                        if (step.zoom_to) {
                            myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                            var viewMeta = overlaysData[step.zoom_to];
                            if (viewMeta && viewMeta.coord) {
                                myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                            } else {
                                myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                            }
                        }

                        if (step.colors) {
                            var currentOption = myChart.getOption();
                            var seriesData = currentOption.series[0].data;
                            var updated = false;
                            for (var i = 0; i < seriesData.length; i++) {
                                var name = seriesData[i].name;
                                if (step.colors[name]) {
                                    if (!seriesData[i].itemStyle) seriesData[i].itemStyle = {};
                                    seriesData[i].itemStyle.areaColor = step.colors[name];
                                    updated = true;
                                }
                            }
                            if (updated) myChart.setOption({ series: [{ data: seriesData }] });
                        }

                        myChart.dispatchAction({ type: 'hideTip' });
                        if (step.show_tooltips) {
                            step.show_tooltips.forEach(function(tooltipId) {
                                myChart.dispatchAction({ type: 'showTip', name: tooltipId });
                            });
                        }
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.scrolly-step').forEach(stepEl => observer.observe(stepEl));
            if (steps.length > 0) container.scrollTop = 0;
        }

        var tourSteps = [];

        function initTour(steps) {
            var container = document.getElementById('tour-container');
            if (!steps || steps.length === 0) {
                container.style.display = 'none';
                return;
            }
            tourSteps = steps;
            currentTourStep = 0;
            container.style.display = 'block';

        function renderTourStep() {
            if (currentTourStep < 0 || currentTourStep >= tourSteps.length) return;

            // Stop existing audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            // Close info panel to ensure map is visible during tour progression
            closePanel();

            var step = tourSteps[currentTourStep];
            document.getElementById('tour-content').innerHTML = sanitizeHTML(step.content);

            // Play audio if present
            if (step.audio_url) {
                currentAudio = new Audio(step.audio_url);
                currentAudio.play().catch(e => console.error("Audio playback failed:", e));
            }
            document.getElementById('tour-progress').innerText = (currentTourStep + 1) + ' / ' + tourSteps.length;
            document.getElementById('tour-prev').disabled = currentTourStep === 0;
            document.getElementById('tour-next').innerText = currentTourStep === tourSteps.length - 1 ? 'Finish' : 'Next';

            if (step.zoom_to) {
                myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                var viewMeta = overlaysData[step.zoom_to];
                if (viewMeta && viewMeta.coord) {
                    myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                } else {
                    myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                }
            }

            myChart.dispatchAction({ type: 'hideTip' });
            if (step.show_tooltips) {
                step.show_tooltips.forEach(tooltipId => myChart.dispatchAction({ type: 'showTip', name: tooltipId }));
            }
        }


        async function exportTourToPDF() {
            if (!window.jspdf) {
                alert("jsPDF library is not loaded.");
                return;
            }

            var btn = document.getElementById('tour-pdf');
            var originalText = btn.innerText;
            btn.innerText = "Generating PDF...";
            btn.disabled = true;

            try {
                const { jsPDF } = window.jspdf;
                // Create a new PDF document (landscape mode for slides)
                const doc = new jsPDF({
                    orientation: 'landscape',
                    unit: 'px',
                    format: [800, 600]
                });

                // Save original state to restore later
                var originalStep = currentTourStep;

                // Iterate over all tour steps
                for (let i = 0; i < tourSteps.length; i++) {
                    currentTourStep = i;

                    // Render the step but without audio
                    var step = tourSteps[i];
                    if (currentAudio) {
                        currentAudio.pause();
                        currentAudio.currentTime = 0;
                    }
                    closePanel();
                    document.getElementById('tour-content').innerHTML = sanitizeHTML(step.content);
                    document.getElementById('tour-progress').innerText = (currentTourStep + 1) + ' / ' + tourSteps.length;

                    if (step.zoom_to) {
                        myChart.dispatchAction({ type: 'geoSelect', name: step.zoom_to });
                        var viewMeta = overlaysData[step.zoom_to];
                        if (viewMeta && viewMeta.coord) {
                            myChart.setOption({ series: [{ center: viewMeta.coord, zoom: step.zoom_level || 2.0 }] });
                        } else {
                            myChart.setOption({ series: [{ zoom: step.zoom_level || 2.0 }] });
                        }
                    }
                    myChart.dispatchAction({ type: 'hideTip' });

                    // Trigger the action if any
                    if (step.action) {
                        handleSivoEvent(step.action);
                    }

                    // Wait for the chart to finish any transition animations
                    await new Promise(resolve => setTimeout(resolve, 800));

                    // Capture ECharts canvas
                    var imgData = myChart.getDataURL({ type: 'jpeg', pixelRatio: 2, backgroundColor: '#ffffff' });

                    // Add a new page if it's not the first slide
                    if (i > 0) {
                        doc.addPage();
                    }

                    // Draw the chart image taking up most of the page
                    doc.addImage(imgData, 'JPEG', 0, 0, 800, 600);

                    // Draw a semi-transparent overlay for the text box
                    doc.setFillColor(255, 255, 255);
                    doc.setDrawColor(200, 200, 200);
                    // We draw the text box similar to the tour container on the bottom right or center
                    doc.rect(40, 480, 720, 100, 'DF'); // Fill and border

                    // Add text
                    doc.setTextColor(0, 0, 0);
                    doc.setFontSize(20);
                    doc.text(step.title || 'Step ' + (i+1), 60, 510);
                    doc.setFontSize(14);
                    // We strip HTML from content to render in PDF cleanly
                    var plainText = document.createElement("div");
                    plainText.innerHTML = sanitizeHTML(step.content);
                    var textLines = doc.splitTextToSize(plainText.innerText || plainText.textContent || "", 680);
                    doc.text(textLines, 60, 535);
                }

                // Save the PDF
                doc.save("SIVO_Guided_Tour.pdf");

                // Restore original state
                currentTourStep = originalStep;
                renderTourStep();

            } catch (err) {
                console.error("PDF generation failed:", err);
                alert("Failed to generate PDF. Check console for details.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
function tourNext() {

                currentTourStep++;
                renderTourStep();
            } else {
                closeTour();
            }

        function tourPrev() {
            if (currentTourStep > 0) {
                currentTourStep--;
